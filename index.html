<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>空もよう？</title>
<link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRDomKNQBdl3DOd2AW9KgS4bA__m9uJjljc0Q&s" sizes="16×16" type="image/png" />
<style>

body{
margin:0;
font-family:Roboto,Arial;
background:#111;
display:flex;
justify-content:center;
}

.phone{
width:380px;
min-height:100vh;
background:#202124;
color:white;
padding:15px;
box-sizing:border-box;
}

.city{
font-size:28px;
font-weight:500;
}

.temp{
font-size:72px;
font-weight:300;
}

.desc{
opacity:0.8;
margin-bottom:15px;
}

.card{
background:#303134;
border-radius:20px;
padding:15px;
margin-bottom:15px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
}

.hourly{
display:flex;
overflow-x:auto;
gap:20px;
}

.hour{
text-align:center;
min-width:50px;
}

.day{
display:flex;
justify-content:space-between;
margin:6px 0;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}

.grid div{
background:#3c4043;
padding:10px;
border-radius:12px;
text-align:center;
font-size:13px;
}

canvas{
width:100%;
height:120px;
}

button{
background:#4285f4;
border:none;
padding:8px 14px;
border-radius:10px;
color:white;
cursor:pointer;
}

</style>
</head>
<body>

<div class="phone">

<div class="city" id="city"></div>

<div class="temp" id="temp"></div>

<div class="desc" id="desc"></div>

<div style="margin-bottom:10px">

<button onclick="changeCity()">都市変更</button>

<button onclick="updateWeather()">天気更新</button>

</div>

<div class="card">
<h3>時間ごとの天気</h3>
<div class="hourly" id="hourly"></div>
</div>

<div class="card">
<h3>7日間予報</h3>
<div id="week"></div>
</div>
<div class="card">
<h3>気象データ</h3>
<div class="grid" id="details2"></div>
</div>
<div class="card">
<h3>太陽</h3>
<canvas id="sunGraph"></canvas>
<div id="sunTimes"></div>
</div>

<div class="card">
<h3>生活のヒント</h3>
<div class="grid" id="details"></div>
</div>

</div>

<script>

const cities=["東京","大阪","札幌","名古屋","京都","福岡","那覇","ニューヨーク","ロンドン","パリ","ソウル","ポートビレ","カイロ","シーラーズ","チャータズタワーズ","ハイデラバード","チェリャビンスク","ベロオリゾンチ",];

const weathers=[
{icon:"☀️",name:"晴れ"},
{icon:"☁️",name:"くもり"},
{icon:"🌧️",name:"雨"},
{icon:"❄️",name:"雪"},
{icon:"⛈️",name:"雷"},
];
let currentCityIndex = 0;

function changeCity(){

currentCityIndex++;

if(currentCityIndex >= cities.length){
currentCityIndex = 0;
}

updateWeather();

}
function updateWeather(){

let city = cities[currentCityIndex];

let w = weathers[Math.floor(Math.random()*weathers.length)];

let temp = Math.floor(Math.random()*30);

document.getElementById("city").innerText = city;
document.getElementById("temp").innerText = temp + "°";
document.getElementById("desc").innerText = w.icon + " " + w.name;

makeHourly();
makeWeek();
makeDetails();
makeDetails2();
drawSun();

}

function makeHourly(){

let div=document.getElementById("hourly");
div.innerHTML="";

for(let i=0;i<12;i++){

let w=weathers[Math.floor(Math.random()*weathers.length)];

let d=document.createElement("div");
d.className="hour";

d.innerHTML=
"<div>"+(i*2)+"時</div>"+
"<div>"+w.icon+"</div>"+
"<div>"+Math.floor(Math.random()*30)+"°</div>";

div.appendChild(d);

}

}

function makeWeek(){

let div=document.getElementById("week");
div.innerHTML="";

const days=["月","火","水","木","金","土","日"];

for(let i=0;i<7;i++){

let w=weathers[Math.floor(Math.random()*weathers.length)];

let d=document.createElement("div");

d.className="day";

d.innerHTML=
"<span>"+days[i]+"</span>"+
"<span>"+w.icon+"</span>"+
"<span>"+Math.floor(Math.random()*30)+"°</span>";

div.appendChild(d);

}

}
const pollen = [
    "ほとんどない",
    "少ない",
    "普通",
    "少し多い",
    "多い",
    "かなり多い",
    "非常に多い"
];
const mosquito = [
    "ほとんどなし",
    "少ない",
    "普通",
    "少し多い",
    "多い",
    "かなり多い",
    "非常に多い"
];
function makeDetails(){

let div=document.getElementById("details");

div.innerHTML="";
let randomPollen = Math.floor(Math.random()* 7);
let currentPollen = pollen[randomPollen];
let randomMosquito = Math.floor(Math.random()* 7);
let currentMosquito = mosquito[randomMosquito];
const list=[
`花粉 ${currentPollen}`,
`蚊の発生 ${currentMosquito}`,

];

list.forEach(t=>{
let d=document.createElement("div");
d.innerText=t;
div.appendChild(d);
});

}
const UV = [
    "0 微弱",
    "1 微弱",
    "2 弱",
    "3 弱",
    "4 弱",
    "5 中",
    "6 中",
    "7 中",
    "8 強",
    "9 強",
    "10 極強",
    "11 極強",
];
const direction =[
    "北",
    "北北東",
    "北東",
    "東北東",
    "東",
    "東南東",
    "南東",
    "南南東",
    "南",
    "南南西",
    "南西",
    "西南西",
    "西",
    "西北西",
    "北西",
    "北北西",
    
]
function makeDetails2(){

let div=document.getElementById("details2");

div.innerHTML="";

let randomMosquito = Math.floor(Math.random()* 7);
let currentMosquito = mosquito[randomMosquito];
let randomUV = Math.floor(Math.random()*11);
let currentUV = UV[randomUV];
let randomDirection = Math.floor(Math.random()* 16);
let currentDirection = direction[randomDirection];
let randomWindow = Math.floor(Math.random()* 20);
const list=[
    `UV ${currentUV}`,
    "体感温度 "+Math.floor(Math.random()*30)+"°",
    "湿度 "+Math.floor(Math.random()*100)+"%",
    `${currentDirection}の風 ${randomWindow}m/s`,
    "気圧 "+(990+Math.floor(Math.random()*40))+"hPa",
    "視界 "+(Math.random()*10).toFixed(1)+"km",
];

list.forEach(t=>{
let d=document.createElement("div");
d.innerText=t;
div.appendChild(d);
});

}
function drawSun(){

let canvas=document.getElementById("sunGraph");
let ctx=canvas.getContext("2d");

canvas.width=340;
canvas.height=120;

ctx.clearRect(0,0,340,120);

ctx.strokeStyle="white";

ctx.beginPath();

for(let x=0;x<=340;x++){

let t=x/340;
let y=100-Math.sin(t*Math.PI)*80;

if(x===0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);

}

ctx.stroke();

let sunX=Math.random()*340;

let sunY=100-Math.sin((sunX/340)*Math.PI)*80;

ctx.beginPath();
ctx.arc(sunX,sunY,6,0,Math.PI*2);
ctx.fillStyle="yellow";
ctx.fill();

document.getElementById("sunTimes").innerText=
"日の出 "+(5+Math.floor(Math.random()*2))+":00  日の入り "+(17+Math.floor(Math.random()*2))+":00";

}

updateWeather();

</script>

</body>
</html>
